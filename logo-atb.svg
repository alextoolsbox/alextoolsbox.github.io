<svg width="140" height="110" viewBox="0 0 140 110" xmlns="http://www.w3.org/2000/svg">

<!-- glow filter -->
<defs>
<filter id="glow">
<feGaussianBlur stdDeviation="2" result="coloredBlur"></feGaussianBlur>
<feMerge>
<feMergeNode in="coloredBlur"></feMergeNode>
<feMergeNode in="SourceGraphic"></feMergeNode>
</feMerge>
</filter>
</defs>

<!-- monitor frame -->
<rect x="20" y="10" width="100" height="70" rx="6" fill="#1a1a1a"></rect>

<!-- screen -->
<rect x="28" y="18" width="84" height="54" rx="3" fill="#000000"></rect>

<!-- screen glow -->
<rect x="28" y="18" width="84" height="54" rx="3" fill="#00ff66" opacity="0.06" filter="url(#glow)"></rect>

<!-- blinking cursor -->
<text x="32" y="26" font-family="monospace" font-size="7" fill="#33ff66">
_
<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"></animate>
</text>

<!-- centered ATB -->
<text x="70" y="52" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold">
<tspan fill="#ff4040">A</tspan>
<tspan fill="#40ff80">T</tspan>
<tspan fill="#4090ff">B</tspan>
</text>

<!-- monitor neck -->
<rect x="62" y="80" width="16" height="8" fill="#1a1a1a"></rect>

<!-- monitor base -->
<rect x="48" y="88" width="44" height="8" rx="3" fill="#1a1a1a"></rect>

</svg>