<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagina non trovata</title>

<meta name="description" content="La pagina che stai cercando non è disponibile. Torna alle sezioni principali del sito.">

<link rel="stylesheet" href="/css/style.css">
<link rel="icon" type="image/png" href="/img/favicon.png">
<script src="/js/promo.js" defer></script>

</head>

<body>

<div id="header"></div>

<script>
fetch("/includes/header.html")
.then(response => response.text())
.then(data => {
  document.getElementById("header").innerHTML = data;
  updatePromo();
});
</script>

<div class="container" style="text-align:center;margin-top:60px;max-width:700px;">

<h1>😅 Questa pagina non esiste</h1>

<p style="margin-top:15px;">
Probabilmente il link è errato oppure la pagina è stata spostata.
</p>

<p>
Vediamo se riesco ad aiutarti 👇
</p>

<!-- CTA BASE -->
<div style="margin-top:30px;">

<a class="button" href="/" style="margin:10px;">
🏠 Vai alla Home
</a>

<a class="button" href="/supporto.html" style="margin:10px;">
📩 Contattami
</a>

</div>

<!-- SUGGERIMENTO DINAMICO -->
<div id="suggestion" class="tip highlight" style="margin-top:40px; display:none;">

<p id="suggestion-text"></p>

<a id="suggestion-link" class="button" href="#" style="margin-top:10px;">
Vai alla guida
</a>

</div>

</div>

<div id="footer"></div>

<script>
fetch("/includes/footer.html")
.then(r => r.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});
</script>

<script>
// 🔥 LOGICA INTELLIGENTE 404

const path = window.location.pathname.toLowerCase();

let suggestionText = "";
let suggestionLink = "";

// 🔥 REVOLUT → pagina principale (non bonus)
if (path.includes("revolut")) {
  suggestionText = "💳 Stavi cercando qualcosa su Revolut? Ti spiego come funziona passo passo e come iniziare senza errori.";
  suggestionLink = "/revolut/index.html";
}

// 🔥 MICROSOFT REWARDS
else if (path.includes("reward") || path.includes("microsoft")) {
  suggestionText = "🎯 Stavi cercando Microsoft Rewards? Trovi una guida completa con strategie per guadagnare punti.";
  suggestionLink = "/microsoft-rewards/index.html";
}

// 🔥 DEFAULT (soft funnel)
else {
  suggestionText = "💡 Non hai trovato quello che cercavi? Dalla homepage puoi accedere a tutte le guide e contenuti disponibili.";
  suggestionLink = "/index.html";
}

// Mostra blocco
document.getElementById("suggestion").style.display = "block";
document.getElementById("suggestion-text").innerText = suggestionText;
document.getElementById("suggestion-link").href = suggestionLink;

</script>

</body>
</html>
